<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FPL Pulse</title>
    <!--
      SPA fallback for GitHub Pages (rafgraph/spa-github-pages).
      GH Pages 404s any deep path (e.g. /fpl-pulse/wrapped?league=X&via=link) on a
      cold load. This script encodes the full path + query + hash into a single
      query-string param and redirects to the app root, where index.html's
      companion decode script restores the real URL before the router boots.
      pathSegmentsToKeep = 1 keeps the /fpl-pulse/ project-page segment as the base
      and encodes everything after it (0 would double-prepend the basename; 2 would
      leave a still-404ing redirect target).
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
