    <!--
      SPA fallback decode (rafgraph/spa-github-pages). Restores the real URL that
      404.html encoded into a ?/… param, via history.replaceState, BEFORE the app
      bundle loads — so BrowserRouter boots on the correct deep route, never the
      404-root URL. Must stay ahead of the deferred main.jsx module below.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
